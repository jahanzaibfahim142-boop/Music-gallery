<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>My Music Gallery</h1>
        <p>Explore my favorite tracks and albums</p>
    </header>

    <main class="gallery-container">
        <div class="music-card">
            <div class="image-container">
                <img src="https://i.ytimg.com/vi/Z7EEq6BsWmE/sddefault.jpg" alt="Album Cover">
                <div class="overlay">
                    <button class="play-btn">▶ Play</button>
                </div>
            </div>
            <div class="card-info">
                <h3>Meri Sanson Main Basa Hai</h3>
                <p>Nusrat Fateh Ali Khan</p>
            </div>
        </div>

        <div class="music-card">
            <div class="image-container">
                <img src="https://i1.sndcdn.com/artworks-000643837189-xv3ryz-t500x500.jpg" alt="Album Cover">
                <div class="overlay">
                    <button class="play-btn">▶ Play</button>
                </div>
            </div>
            <div class="card-info">
                <h3>Ravvi</h3>
                <p>Sajjad Ali </p>
            </div>
        </div>

    </main>

<h3>My favorite tracks</h3>
</body>

</html>
